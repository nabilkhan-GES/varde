name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 * * * *' # hourly — refresh the feed snapshots
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Snapshot live feeds → public/data/*.json
        run: npm run snapshot
        env:
          # Optional free keys — add as repo Actions secrets to populate the
          # matching feeds (all degrade gracefully when absent):
          #   EIA_API_KEY     → Energy Complex + Oil Inventories (eia.gov/opendata)
          #   NASA_FIRMS_API_KEY → Wildfire hotspots (firms.modaps.eosdis.nasa.gov/api)
          #   GIE_API_KEY     → EU Gas Storage (agsi.gie.eu/account)
          #   AISSTREAM_API_KEY → Tankers (AIS) — timed WS sample (aisstream.io)
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          NASA_FIRMS_API_KEY: ${{ secrets.NASA_FIRMS_API_KEY }}
          GIE_API_KEY: ${{ secrets.GIE_API_KEY }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
          ACLED_ACCESS_TOKEN: ${{ secrets.ACLED_ACCESS_TOKEN }}
      - name: Build (GitHub Pages base path)
        run: npm run build
        env:
          BASE_PATH: /varde/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
