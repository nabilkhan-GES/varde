name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 * * * *' # hourly — refresh the feed snapshots
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Snapshot live feeds → public/data/*.json
        run: npm run snapshot
        env:
          # Optional: add EIA_API_KEY as a repo Actions secret to populate the
          # Energy Complex inventory/storage cards (free at eia.gov/opendata).
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      - name: Build (GitHub Pages base path)
        run: npm run build
        env:
          BASE_PATH: /varde/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
